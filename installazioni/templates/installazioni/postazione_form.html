{% extends "base.html" %}
{% load static crispy_forms_tags %}
{% block content %}
<div class="page-header mb-4">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="{% url 'installazioni:installazione_list' %}">Installazioni</a></li>
      <li class="breadcrumb-item"><a href="{{ inst.get_absolute_url }}">{{ inst.numero }}</a></li>
      <li class="breadcrumb-item active">{{ title }}</li>
    </ol>
  </nav>
  <h1><i class="bi bi-geo-alt me-2 text-brand"></i>{{ title }}</h1>
</div>

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex justify-content-between mt-3">
            <a href="{{ inst.get_absolute_url }}" class="btn btn-outline-secondary">Annulla</a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Salva
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
