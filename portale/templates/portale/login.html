<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso — Portale Clienti SERVAL</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f4f7fb; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.1); padding: 2.5rem; width: 100%; max-width: 400px; }
    .login-logo { color: #5585b5; font-size: 2.5rem; }
    .btn-brand { background: #5585b5; color: #fff; border: none; }
    .btn-brand:hover { background: #3a6494; color: #fff; }
  </style>
</head>
<body>
<div class="login-box text-center">
  <div class="login-logo mb-2"><i class="bi bi-shield-check"></i></div>
  <h5 class="fw-bold mb-1">Area Clienti</h5>
  <p class="text-muted small mb-4">SERVAL SRLS Unipersonale</p>

  {% if error %}
  <div class="alert alert-danger text-start py-2 small">{{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    <div class="mb-3 text-start">
      <label class="form-label fw-semibold">Nome utente</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
    </div>
    <div class="mb-4 text-start">
      <label class="form-label fw-semibold">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control" required>
      </div>
    </div>
    <button type="submit" class="btn btn-brand w-100 py-2">
      <i class="bi bi-box-arrow-in-right me-1"></i>Accedi
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
