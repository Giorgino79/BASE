{% extends "base.html" %}
{% block title %}Archivia corrispondenza{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card">
      <div class="card-body p-4 text-center">
        <div class="mb-3" style="color:var(--slate-500);font-size:3rem;"><i class="bi bi-archive"></i></div>
        <h5 class="fw-bold mb-2">Archivia corrispondenza</h5>
        <p class="text-muted mb-1">Stai per archiviare:</p>
        <p class="fw-semibold mb-4">"{{ corrispondenza.oggetto }}"</p>
        <form method="post" class="d-flex gap-2 justify-content-center">
          {% csrf_token %}
          <a href="{% url 'corrispondenza:dettaglio' corrispondenza.pk %}" class="btn btn-outline-secondary">Annulla</a>
          <button type="submit" class="btn btn-primary"><i class="bi bi-archive me-1"></i>Archivia</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
