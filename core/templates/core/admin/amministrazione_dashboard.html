{% extends "base.html" %}

{% block title %}Amministrazione{% endblock %}

{% block extra_css %}
<style>
  .hr-tile {
    border-left: 4px solid var(--color-1);
    transition: transform .15s, box-shadow .15s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .hr-tile:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,.12) !important;
    color: inherit;
  }
  .hr-tile-icon {
    width: 52px; height: 52px;
    border-radius: .75rem;
    background: var(--color-1-light, rgba(var(--color-1-rgb, 79,70,229),.12));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    color: var(--color-1);
    flex-shrink: 0;
  }
  .hr-section-title {
    font-size: .7rem; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--slate-400);
    margin-bottom: .75rem; margin-top: 2rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="mb-4">
  <h4 class="fw-bold mb-1" style="color:var(--slate-900);">
    <i class="bi bi-gear-fill me-2" style="color:var(--color-1);"></i>Amministrazione
  </h4>
  <p class="text-muted mb-0" style="font-size:.875rem;">
    Configurazione avanzata del sistema
  </p>
</div>

<div class="hr-section-title">Sistema</div>
<div class="row g-3">

  <div class="col-sm-6 col-lg-4">
    <a href="{% url 'admin:index' %}" target="_blank" class="card border-0 shadow-sm hr-tile">
      <div class="card-body d-flex align-items-center gap-3 py-3">
        <div class="hr-tile-icon"><i class="bi bi-shield-fill"></i></div>
        <div>
          <div class="fw-semibold" style="font-size:.9rem;">Admin Django</div>
          <div class="text-muted" style="font-size:.78rem;">Pannello di amministrazione</div>
        </div>
      </div>
    </a>
  </div>

</div>
{% endblock %}
