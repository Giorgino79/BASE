{% extends "base.html" %}
{% block content %}
<div class="page-header mb-4">
  <h1><i class="bi bi-trash me-2 text-brand"></i>Elimina Prodotto</h1>
</div>
<div class="card">
  <div class="card-body">
    <p>Confermi l'eliminazione del prodotto <strong>{{ object.nome_prodotto }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-primary">Elimina</button>
      <a href="{{ object.get_absolute_url }}" class="btn btn-outline-secondary ms-2">Annulla</a>
    </form>
  </div>
</div>
{% endblock %}
