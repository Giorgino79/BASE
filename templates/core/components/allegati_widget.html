{% comment %}
Widget allegati: due bottoni che aprono i modal di upload e gestione.
Richiede nel contesto: content_type_id, object_id
Conta allegati opzionale: allegati_count (intero)
{% endcomment %}
<div class="allegati-widget d-flex gap-2 flex-wrap">
  <button type="button"
          class="btn btn-outline-secondary btn-sm"
          data-bs-toggle="modal"
          data-bs-target="#allegatoUploadModal"
          onclick="
            document.getElementById('allegatoUploadModal').dataset.contentTypeId = '{{ content_type_id }}';
            document.getElementById('allegatoUploadModal').dataset.objectId = '{{ object_id }}';
          ">
    <i class="bi bi-upload me-1"></i>Carica Allegato
  </button>
  <button type="button"
          class="btn btn-outline-secondary btn-sm position-relative"
          data-bs-toggle="modal"
          data-bs-target="#allegatiGestioneModal"
          onclick="
            document.getElementById('allegatiGestioneModal').dataset.contentTypeId = '{{ content_type_id }}';
            document.getElementById('allegatiGestioneModal').dataset.objectId = '{{ object_id }}';
          ">
    <i class="bi bi-folder2-open me-1"></i>Gestisci Allegati
    {% if allegati_count %}
    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-primary"
          style="font-size:.65rem;">{{ allegati_count }}</span>
    {% endif %}
  </button>
</div>
