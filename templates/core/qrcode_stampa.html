<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etichetta QR — {{ object_label }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .label-card {
      background: #fff;
      border: 2px solid #1a1a1a;
      border-radius: 8px;
      padding: 24px 28px;
      text-align: center;
      width: 260px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
    }

    .label-card img {
      width: 180px;
      height: 180px;
      display: block;
      margin: 0 auto 12px;
    }

    .label-title {
      font-size: 13px;
      font-weight: 700;
      color: #1a1a1a;
      word-break: break-word;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .label-type {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .no-print {
      margin-top: 24px;
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-print {
      background: #5585b5;
      color: #fff;
    }

    .btn-back {
      background: #fff;
      color: #555;
      border: 1px solid #ccc;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
        justify-content: flex-start;
      }

      .label-card {
        border: 1px solid #000;
        box-shadow: none;
        margin: 0;
      }

      .no-print {
        display: none !important;
      }
    }
  </style>
</head>
<body>

<div class="label-card">
  <img src="{{ qr_obj.qr_image.url }}" alt="QR Code {{ object_label }}">
  <div class="label-title">{{ object_label }}</div>
  <div class="label-type">{{ content_type.app_label }} / {{ content_type.model }}</div>
</div>

<div class="no-print">
  <button class="btn btn-print" onclick="window.print()">
    &#x1F5A8; Stampa
  </button>
  <a href="javascript:history.back()" class="btn btn-back">
    &#8592; Indietro
  </a>
</div>

<script>
  window.addEventListener('load', function () {
    const params = new URLSearchParams(window.location.search);
    if (params.get('autoprint') === '1') {
      setTimeout(function () { window.print(); }, 400);
    }
  });
</script>

</body>
</html>
