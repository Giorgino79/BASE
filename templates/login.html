{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accesso — Rattus26</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <style>
    body {
      background: var(--slate-100);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid var(--slate-200);
      border-radius: var(--radius-lg);
      box-shadow: var(--card-shadow-hover);
      padding: 2.5rem 2rem;
    }
    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }
    .login-brand-icon {
      width: 52px; height: 52px;
      background: var(--color-1);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 1.5rem;
      margin-bottom: .75rem;
    }
    .login-brand-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--slate-900);
      margin: 0;
    }
    .login-brand-sub {
      font-size: .8rem;
      color: var(--slate-400);
      margin-top: .15rem;
    }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .bi {
      position: absolute;
      left: .85rem; top: 50%; transform: translateY(-50%);
      color: var(--slate-400); pointer-events: none;
    }
    .input-icon-wrap .form-control { padding-left: 2.5rem; }
    .input-icon-wrap .btn-pwd {
      position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--slate-400); cursor: pointer; padding: 0;
    }
    .input-icon-wrap .form-control.has-toggle { padding-right: 2.5rem; }
    .login-copyright {
      text-align: center;
      color: var(--slate-400);
      font-size: .75rem;
      margin-top: 1.75rem;
    }
  </style>
</head>
<body>

  <div class="login-card">

    <div class="login-brand">
      <div class="login-brand-icon"><i class="bi bi-grid-3x3-gap-fill"></i></div>
      <div class="login-brand-title">Rattus26</div>
      <div class="login-brand-sub">Accedi per continuare</div>
    </div>

    {% if form.errors %}
      <div class="alert alert-danger d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
        <span>Credenziali non valide. Riprova.</span>
      </div>
    {% endif %}

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} d-flex align-items-center gap-2 mb-3">
          <i class="bi bi-info-circle-fill flex-shrink-0"></i>
          <span>{{ message }}</span>
        </div>
      {% endfor %}
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label" for="id_username">Username</label>
        <div class="input-icon-wrap">
          <i class="bi bi-person"></i>
          <input
            type="text"
            id="id_username"
            name="username"
            class="form-control{% if form.username.errors %} is-invalid{% endif %}"
            placeholder="Il tuo username"
            autocomplete="username"
            autofocus
            value="{{ form.username.value|default:'' }}"
          >
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label" for="id_password">Password</label>
        <div class="input-icon-wrap">
          <i class="bi bi-lock"></i>
          <input
            type="password"
            id="id_password"
            name="password"
            class="form-control has-toggle{% if form.password.errors %} is-invalid{% endif %}"
            placeholder="••••••••"
            autocomplete="current-password"
          >
          <button type="button" class="btn-pwd" onclick="togglePassword()" tabindex="-1">
            <i class="bi bi-eye" id="pwdToggleIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2">
        <i class="bi bi-box-arrow-in-right"></i> Accedi
      </button>
    </form>

    <div class="login-copyright">&copy; {% now "Y" %} Rattus26 — Tutti i diritti riservati</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePassword() {
      const input = document.getElementById('id_password');
      const icon  = document.getElementById('pwdToggleIcon');
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    }
  </script>
</body>
</html>
