{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-header text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Conferma Eliminazione</div>
      <div class="card-body">
        <p>Sei sicuro di voler eliminare il cliente <strong>{{ privato.nome_completo }}</strong>?</p>
        <p class="text-muted small">L'operazione è irreversibile.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Elimina</button>
            <a href="{{ object.get_absolute_url }}" class="btn btn-outline-secondary">Annulla</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
